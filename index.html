<script>
document.getElementById("playerForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(this);

  const message =
    "Name: " + formData.get("name") + "\n" +
    "Power: " + formData.get("power") + "\n" +
    "ERA: " + formData.get("era") + "\n" +
    "Merit: " + formData.get("merit") + "\n" +
    "Reason: " + formData.get("reason");

  try {
    const res = await fetch("https://discord.com/api/webhooks/1497176070208749729/jSfib8yu1D_k_C-73kWOP4NmOeA_d0IocqUBA1cTMHbSLBNSOh5zvXglM2PZyjMpE0DA", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content: message })
    });

    if (!res.ok) {
      const text = await res.text();
      console.log("Discord error:", text);
      alert("Failed to send");
      return;
    }

    alert("Submitted!");
    this.reset();

  } catch (err) {
    console.error(err);
    alert("Error sending form");
  }
});
</script>
