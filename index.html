<!DOCTYPE html>
<html>
<head>
  <title>Submit Player</title>
</head>
<body>

<h2>Submit Your Information</h2>

<!-- Image on top -->
<img src="E42 v3 github.png" alt="Banner" style="display:block; margin-bottom:20px;">

<form id="playerForm">
  <input type="text" name="name" placeholder="InGame Name" required><br><br>
  <input type="number" name="power" placeholder="Power" required><br><br>
  <input type="text" name="era" placeholder="ERA" required><br><br>
  <input type="number" name="merit" placeholder="Merit" required><br><br>

  <!-- New field -->
  <textarea name="reason" placeholder="Reason for migration" required></textarea><br><br>

  <button type="submit">Apply</button>
</form>
<script>
document.getElementById("playerForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const data = new FormData(this);

  const message =
"New Submission:\n" +
"InGame Name: " + data.get("name") + "\n" +
"Power: " + data.get("power") + "\n" +
"ERA: " + data.get("era") + "\n" +
"Merit: " + data.get("merit") + "\n" +
"Reason: " + data.get("reason");
New Submission:
InGame Name: ${data.get("name")}
Power: ${data.get("power")}
ERA: ${data.get("era")}
Merit: ${data.get("merit")}
  `;

  await fetch("https://discord.com/api/webhooks/1497176070208749729/jSfib8yu1D_k_C-73kWOP4NmOeA_d0IocqUBA1cTMHbSLBNSOh5zvXglM2PZyjMpE0DA", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ content: message })
  });

  alert("Submitted!");
});
</script>

</body>
</html>
